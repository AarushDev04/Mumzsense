name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_backend.yml'
  workflow_dispatch:   # Allow manual trigger

jobs:
  test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install a lighter subset for CI (no TF/torch to keep it fast)
          pip install fastapi pydantic pydantic-settings uvicorn langgraph \
                      scikit-learn numpy scipy langdetect redis httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ --ignore E501

      - name: Import smoke test (no GPU, no DB)
        working-directory: backend
        env:
          SUPABASE_URL: "http://localhost"
          SUPABASE_KEY: "dummy"
          REDIS_URL: ""
          LLAMA_API_KEY: "dummy"
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from config import settings
          from schemas import QueryRequest, QueryResponse
          print('✓ config and schemas import OK')
          "

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service backend --detach

      - name: Wait for Railway healthcheck
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "✗ Backend did not become healthy within 2 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Backend deployment failed. Check Railway logs."